---

- name: vscode
  hosts: 127.0.0.1
  connection: local
  become: yes
  tasks:

  - name: microsoft apt key
    apt_key:
      keyserver: ha.pool.sks-keyservers.net
      id: EB3E94ADBE1229CF

  - name: vscode apt repo
    apt_repository:
      repo: deb [arch=amd64] http://packages.microsoft.com/repos/vscode stable main
      filename: vscode

  - name: install vscode
    apt:
      name: code

- name: vscode settings
  hosts: 127.0.0.1
  connection: local
  become: yes
  become_user: davido
  tasks:

  - name: install vscode settings
    copy:
      src: vscode/
      dest: /home/davido/.config/Code/User/
