---

- name: apt
  hosts: 127.0.0.1
  connection: local
  become: yes
  tasks:

  - name: google apt key
    apt_key:
      keyserver: keyserver.ubuntu.com
      id: D38B4796

  - name: google apt repo
    apt_repository:
      repo: deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main
      filename: google-chrome

  - name: install packages
    apt:
      name: "{{ packages }}"
    vars:
      packages:
        - vim
        - git
        - papirus-icon-theme
        - google-chrome-stable
        - yakuake

  - name: remove apport
    apt:
      name: apport
      state: absent
      purge: yes

  - name: autoremove
    apt:
      autoremove: yes
