---

- name: slack
  hosts: 127.0.0.1
  connection: local
  become: yes
  tasks:

  - name: slack apt key
    apt_key:
      keyserver: keyserver.ubuntu.com
      id: D938EC0D038651BD

  - name: slack apt repo
    apt_repository:
      repo: deb https://packagecloud.io/slacktechnologies/slack/debian/ jessie main
      filename: slack

  - name: install slack
    apt:
      name: slack-desktop
