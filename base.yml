---

- name: base (root)
  hosts: 127.0.0.1
  connection: local
  become: yes
  tasks:

  - name: install apt packages
    apt:
      name: "{{ packages }}"
    vars:
      packages:
        - vim
        - git
        - papirus-icon-theme
        - htop
        - jq
        - curl
        - fish
        - fonts-cascadia-code

  - name: remove apport and snapd
    apt:
      name: "{{ packages }}"
      state: absent
      purge: yes
    vars:
      packages:
        - apport
        - snapd

  - name: autoremove
    apt:
      autoremove: yes
