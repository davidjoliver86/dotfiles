---

- name: base (root)
  hosts: 127.0.0.1
  connection: local
  become: yes
  tasks:

  - name: google apt key
    apt_key:
      keyserver: ha.pool.sks-keyservers.net
      id: D38B4796

  - name: google apt repo
    apt_repository:
      repo: deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main
      filename: google-chrome
      mode: "0644"

  - name: install apt packages
    apt:
      name: "{{ packages }}"
    vars:
      packages:
        - vim
        - git
        - papirus-icon-theme
        - htop
        - jq
        - curl
        - fish
        - google-chrome-stable
        - network-manager-config-connectivity-ubuntu

  - name: remove apport and snapd
    apt:
      name: "{{ packages }}"
      state: absent
      purge: yes
    vars:
      packages:
        - apport
        - snapd

  - name: autoremove
    apt:
      autoremove: yes

- name: base (davido)
  hosts: 127.0.0.1
  connection: local
  become: yes
  become_user: davido
  tasks:
  
  - name: install fontconfig
    copy:
      src: fontconfig/
      dest: /home/davido/.config/fontconfig/
      mode: "0644"
