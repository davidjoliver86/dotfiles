---

- name: oh my fish
  hosts: 127.0.0.1
  connection: local
  become: yes
  become_user: davido
  tasks:

  - name: install oh my fish
    shell: curl -L https://get.oh-my.fish | fish
    args:
      creates: /home/davido/.local/share/omf
      executable: /usr/bin/fish
 
  - name: copy fish config
    copy:
      src: fish/
      dest: ~/.config/fish/

  - name: copy omf config
    copy:
      src: omf/
      dest: ~/.config/omf/
